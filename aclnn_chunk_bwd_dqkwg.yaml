# Load this directory as a plugin for case generation and execution.  The
# generator owns all correlated shapes; YAML shapes are bounded seed metadata.
api: pytorch
api_type: executor_chunk_bwd_dqkwg
version: v2.1
name: aclnn.chunk.bwd.dqkwg
aclnn_name: ChunkBwdDqkwg
generate: generator_chunk_bwd_dqkwg
# There are two qkv dtypes, so this produces 64 deterministic cases.  The
# generator maps those cases to the full Cartesian product of its six binary
# dimensions (dtype/chunk_size/is_mix/is_fix/value_dim/head_ratio).
dtype_numbers: 32
extra_numbers: 0
standard:
  acc: cv_fused_double_benchmark
inputs:
  - name: q
    type: tensor
    required: true
    dtypes:
      values: [bf16, fp16]
    ranges:
      valid:
        values: [ [ -5, 5 ] ]
      invalid:
        values: []
    shapes:
      dim_numbers:
        values: [ 4 ]
      dim_values:
        values: [ 1 ]
      max_length: 2
  - name: k
    type: tensor
    required: true
    dtypes:
      values: [bf16, fp16]
    ranges:
      valid:
        values: [ [ -5, 5 ] ]
      invalid:
        values: []
    shapes:
      dim_numbers:
        values: [ 4 ]
      dim_values:
        values: [ 1 ]
      max_length: 2
  - name: v
    type: tensor
    required: true
    dtypes:
      values: [bf16, fp16]
    ranges:
      valid:
        values: [ [ -5, 5 ] ]
      invalid:
        values: []
    shapes:
      dim_numbers:
        values: [ 4 ]
      dim_values:
        values: [ 1 ]
      max_length: 2
  - name: g
    type: tensor
    required: true
    dtypes:
      values: [fp32]
    ranges:
      valid:
        values: [ [ -5, 5 ] ]
      invalid:
        values: []
    shapes:
      dim_numbers:
        values: [ 3 ]
      dim_values:
        values: [ 1 ]
      max_length: 2
  - name: h
    type: tensor
    required: true
    dtypes:
      values: [bf16, fp16]
    ranges:
      valid:
        values: [ [ -5, 5 ] ]
      invalid:
        values: []
    shapes:
      dim_numbers:
        values: [ 5 ]
      dim_values:
        values: [ 1 ]
      max_length: 2
  - name: do
    type: tensor
    required: true
    dtypes:
      values: [bf16, fp16]
    ranges:
      valid:
        values: [ [ -5, 5 ] ]
      invalid:
        values: []
    shapes:
      dim_numbers:
        values: [ 4 ]
      dim_values:
        values: [ 1 ]
      max_length: 2
  - name: dh
    type: tensor
    required: true
    dtypes:
      values: [bf16, fp16]
    ranges:
      valid:
        values: [ [ -5, 5 ] ]
      invalid:
        values: []
    shapes:
      dim_numbers:
        values: [ 5 ]
      dim_values:
        values: [ 1 ]
      max_length: 2
  - name: dv
    type: tensor
    required: true
    dtypes:
      values: [bf16, fp16]
    ranges:
      valid:
        values: [ [ -5, 5 ] ]
      invalid:
        values: []
    shapes:
      dim_numbers:
        values: [ 4 ]
      dim_values:
        values: [ 1 ]
      max_length: 2
  - name: cu_seqlens
    type: tensor
    required: true
    dtypes:
      values: [int64]
    ranges:
      valid:
        values: [ [ 16, 64 ] ]
      invalid:
        values: []
    shapes:
      dim_numbers:
        values: [ 1 ]
      dim_values:
        values: [ 4 ]
      max_length: 5
  - name: chunk_indices
    type: tensor
    required: true
    dtypes:
      values: [int64]
    ranges:
      valid:
        values: [ [ 0, 1 ] ]
      invalid:
        values: []
    shapes:
      dim_numbers:
        values: [ 2 ]
      dim_values:
        values: [ 1 ]
      max_length: 2
  - name: w
    type: tensor
    # Required here means the key is always present for executor setup.  The
    # executor still passes None/nullptr to the ACLNN optional w argument.
    required: true
    dtypes:
      values: [bf16, fp16]
    ranges:
      valid:
        values: [ [ -5, 5 ] ]
      invalid:
        values: []
    shapes:
      dim_numbers:
        values: [ 4 ]
      dim_values:
        values: [ 1 ]
      max_length: 2
  - name: g_gamma
    type: tensor
    # Same compatibility rule as w: present in JSON, null at the operator ABI.
    required: true
    dtypes:
      values: [fp32]
    ranges:
      valid:
        values: [ [ -5, 5 ] ]
      invalid:
        values: []
    shapes:
      dim_numbers:
        values: [ 2 ]
      dim_values:
        values: [ 1 ]
      max_length: 2
  - name: scale
    type: attr
    required: true
    dtypes:
      values: [float]
    ranges:
      valid:
        values: [0.088]
      invalid:
        values: []
  - name: chunk_size
    type: attr
    required: true
    dtypes:
      values: [int]
    ranges:
      valid:
        values: [64, 128]
      invalid:
        values: []
  - name: is_mix
    type: attr
    required: true
    dtypes:
      values: [bool]
    ranges:
      valid:
        values: [true, false]
      invalid:
        values: []
  - name: is_fix
    type: attr
    required: true
    dtypes:
      values: [bool]
    ranges:
      valid:
        values: [true, false]
      invalid:
        values: []
  - name: use_exp2
    type: attr
    required: true
    dtypes:
      values: [bool]
    ranges:
      valid:
        values: [false]
      invalid:
        values: []
  - name: transpose_state_layout
    type: attr
    required: true
    dtypes:
      values: [bool]
    ranges:
      valid:
        values: [false]
      invalid:
        values: []
  - name: qkv_type
    type: attr
    required: true
    dtypes:
      values: [string]
    ranges:
      valid:
        values: ["bf16", "fp16"]
      invalid:
        values: []
