# Load this directory as a plugin for case generation and execution.  The
# generator owns all correlated shapes; YAML shapes are bounded seed metadata.
api: pytorch
api_type: executor_chunk_bwd_dqkwg
version: v2.1
name: aclnn.chunk.bwd.dqkwg
aclnn_name: ChunkBwdDqkwg
generate: generator_chunk_bwd_dqkwg
# One YAML dtype combination times 12 bounded profiles from the generator.
# Do not add a tiny shapes.max_length: ATK validates the unit seed shapes
# before after_case_config installs the correlated operator shapes.
dtype_numbers: 12
extra_numbers: 0
standard:
  acc: cv_fused_double_benchmark
inputs:
  - name: q
    type: tensor
    required: true
    dtypes:
      values: [fp16]
    ranges:
      valid:
        values: [ [ -5, 5 ] ]
      invalid:
        values: []
    shapes:
      dim_numbers:
        values: [ 4 ]
      dim_values:
        values: [ 1 ]
