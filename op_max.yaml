# op_max.yaml
api: pytorch
api_type: function
version: v2.1
name: torch.max
aclnn_name: MaxDim
dtype_numbers: 200
extra_numbers: all
generate: reduce
standard:
    acc: default
    perf: not_key
inputs:
  - name: input
    type: tensor
    required: true
    dtypes:
      values: [ fp32 ]
    ranges:
      valid:
        values: [ [-5, 5] ]
      invalid:
        values: [ [-5, 5] ]
    shapes:
      dim_numbers:
        values: [1, 2, 3, 4, 5, 6, 7, 8]
      max_length: 4294967295
    boundary:
      has_empty: false
      has_infnan: false
      has_scalar: false
      has_upper_border: false
      has_lower_border: false
  - name: dim
    type: attr
    required: true
    dtypes:
      values: [ int ]
    ranges:
      valid:
        values: [ [-5, 5] ]
      invalid:
        values: [ [-5, 5] ]
  - name: keepdim
    type: attr
    required: false
    dtypes:
      values: [ bool ]
    ranges:
      valid:
        values: [ true,  false ]
        weights: [ 0.5, 0.5 ]